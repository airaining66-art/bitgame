<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reaction Rhythm Demo</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud">
        <div class="stat">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>BPM</span>
          <strong id="bpm">100</strong>
        </div>
        <div class="hearts" id="hearts" aria-label="Health"></div>
      </section>

      <section class="playfield" id="playfield" aria-label="Playfield">
        <div class="combo-panel" id="comboPanel">
          <div class="combo-word" id="comboWord">combo</div>
          <div class="combo-count" id="comboCount">0</div>
        </div>

        <div class="lane top-lane" id="topLane"></div>
        <div class="lane bottom-lane" id="bottomLane"></div>
        <div class="hit-column" aria-hidden="true"></div>
        <div class="feedback" id="feedback">Ready</div>
        <div class="countdown" id="countdown">3</div>
      </section>

      <button class="hit-button" id="hitButton" type="button">PRESS</button>

      <div class="game-over" id="gameOver" hidden>
        <div class="game-over-card">
          <h1>Game Over</h1>
          <p id="finalScore">Score 0</p>
          <button id="restartButton" type="button">Restart</button>
        </div>
      </div>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
